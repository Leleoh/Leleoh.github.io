<!DOCTYPE html>
<html>
<head>
</head>
<body>
<div id="shader-bg"></div>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react",
    "react-dom/client": "https://esm.sh/react-dom/client",
    "@shadergradient/react": "https://esm.sh/@shadergradient/react",
    "three": "https://esm.sh/three",
    "@react-three/fiber": "https://esm.sh/@react-three/fiber"
  }
}
</script>
<script type="module">
  import React from 'react';
  import { createRoot } from 'react-dom/client';
  import { ShaderGradientCanvas, ShaderGradient } from '@shadergradient/react';

  const root = createRoot(document.getElementById('shader-bg'));
  root.render(
    React.createElement(ShaderGradientCanvas, 
      { style: { position: 'fixed', top: 0, left: 0, width: '100vw', height: '100vh', zIndex: -10, pointerEvents: 'none' } },
      React.createElement(ShaderGradient, {
        animate: "on",
        axesHelper: "off",
        bgColor1: "#000000",
        bgColor2: "#000000",
        brightness: 1,
        color1: "#803e08",
        color2: "#3022ca",
        color3: "#212121",
        destination: "onCanvas",
        embedMode: "off",
        envPreset: "city",
        format: "gif",
        fov: 45,
        frameRate: 10,
        gizmoHelper: "hide",
        grain: "off",
        lightType: "3d",
        pixelDensity: 1,
        type: "waterPlane",
        uDensity: 1.5,
        uSpeed: 0.1,
        uStrength: 1.5,
        uTime: 8,
        positionX: 0,
        positionY: 0,
        positionZ: 0,
        rotationX: 50,
        rotationY: 0,
        rotationZ: -60,
        cAzimuthAngle: 180,
        cDistance: 2.8,
        cPolarAngle: 80,
        cameraZoom: 9.1,
        wireframe: false
      })
    )
  );
</script>
</body>
</html>
